<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Financeiro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>💰 Controle Financeiro</h1>

    <div class="resumo">
        <div class="card">
            <h3>Saldo</h3>
            <div class="valor" id="saldo">R$ 0,00</div>
        </div>
        <div class="card">
            <h3>Receitas</h3>
            <div class="valor" id="receitas">R$ 0,00</div>
        </div>
        <div class="card">
            <h3>Despesas</h3>
            <div class="valor" id="despesas">R$ 0,00</div>
        </div>
    </div>

    <div class="formulario">
        <input type="text" id="descricao" placeholder="Descrição">
        <input type="number" id="valor" placeholder="Valor" step="0.01" min="0">

        <select id="tipo">
            <option value="receita">Receita</option>
            <option value="despesa">Despesa</option>
        </select>

        <select id="categoria"></select>

        <input type="date" id="data">

        <div class="form-botoes">
            <button id="btnAdicionar">Adicionar</button>
            <button id="btnCancelar" class="btn-cancelar oculto">Cancelar edição</button>
        </div>
    </div>

    <div class="grafico-card">
        <h2>Despesas por categoria</h2>
        <div class="grafico-wrap">
            <canvas id="graficoCategorias"></canvas>
        </div>
        <p class="grafico-vazio" id="graficoVazio">Nenhuma despesa lançada ainda.</p>
    </div>

    <div class="lista">
        <div class="lista-topo">
            <h2>Histórico</h2>
            <button id="btnExportar" class="btn-exportar">Exportar CSV</button>
        </div>

        <div class="filtros">
            <select id="filtroTipo">
                <option value="todos">Todos os tipos</option>
                <option value="receita">Só receitas</option>
                <option value="despesa">Só despesas</option>
            </select>

            <select id="filtroCategoria">
                <option value="todas">Todas as categorias</option>
            </select>

            <input type="month" id="filtroMes">
            <button id="btnLimparFiltros" class="btn-limpar">Limpar filtros</button>
        </div>

        <div id="historico"></div>
        <p class="lista-vazia oculto" id="listaVazia">Nenhuma transação encontrada.</p>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="script.js"></script>
</body>
</html>
